apiVersion: v1
kind : PersistentVolume
metadata:
  name: my-pv 
spec:
  capacity: 
    storage: 2Gi

  accessModes: 
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain  #When the PVC is deleted, Kubernetes does not delete the storage, the data remains.
  
  hostPath:
    path: /mnt/data   #For learning, we'll use a local directory on the node.Later, in EKS production, we'll replace this with Amazon EBS.
